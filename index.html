  { id:5, cat:"strength", yt:"qEwKCR5JCog", name:{es:"Press Militar Mancuernas",en:"Dumbbell Shoulder Press"}, desc:{es:"Hombros fuertes para recepciones aéreas y lanzamientos.",en:"Strong shoulders for aerial saves and throws."}, muscles:{es:["Deltoides","Tríceps","Trapecio"],en:["Deltoid","Triceps","Trapezius"]}, sets:"3×12", rest:"75s", level:"Intermedio", tips:{es:["Core activo","No arquees la espalda","Controla la bajada"],en:["Active core","Don't arch back","Control descent"]}, icon:"🎯"},
  { id:6, cat:"strength", yt:"SkNsa3eBwLA", name:{es:"Sentadilla Búlgara",en:"Bulgarian Split Squat"}, desc:{es:"Fortalece cada pierna independiente. Mejora la potencia de salida unilateral.",en:"Strengthens each leg independently. Improves unilateral diving power."}, muscles:{es:["Cuádriceps","Glúteos","Core"],en:["Quadriceps","Glutes","Core"]}, sets:"3×10 c/lado", rest:"90s", level:"Avanzado", tips:{es:["Pie trasero en banco","Rodilla delantera sobre el pie","Torso erguido"],en:["Rear foot on bench","Front knee over foot","Upright torso"]}, icon:"🦵"},
  { id:7, cat:"agility", yt:"BEZAjx51Lx0", name:{es:"Escalera de Agilidad",en:"Agility Ladder"}, desc:{es:"Mejora coordinación de pies y velocidad de reacción.",en:"Improves foot coordination and reaction speed."}, muscles:{es:["Gemelos","Core","Coordinación"],en:["Calves","Core","Coordination"]}, sets:"6×20m", rest:"45s", level:"Básico", tips:{es:["Brazos activos","Mirada al frente","Máxima velocidad"],en:["Active arms","Eyes forward","Maximum speed"]}, icon:"🪜"},
  { id:8, cat:"agility", yt:"yfvj7E14lAM", name:{es:"Caídas Laterales con Balón",en:"Lateral Diving Saves"}, desc:{es:"Simula parar un disparo. Lánzate lateralmente y vuelta a posición.",en:"Simulates real save. Dive laterally and return to position."}, muscles:{es:["Glúteos","Core","Hombros"],en:["Glutes","Core","Shoulders"]}, sets:"4×6 c/lado", rest:"60s", level:"Intermedio", tips:{es:["Posición de portero correcta","Cuerpo alineado al caer","Recupera rápido"],en:["Correct goalkeeper stance","Body aligned on landing","Quick recovery"]}, icon:"🧤"},
  { id:9, cat:"agility", yt:"hJkSJ9rUcTc", name:{es:"Reacción con Conos 4 Dir.",en:"4-Direction Cone Reaction"}, desc:{es:"Entrena toma de decisión. El entrenador señala y el portero reacciona.",en:"Trains decision-making. Coach signals and goalkeeper reacts."}, muscles:{es:["Sistema nervioso","Gemelos","Reflejos"],en:["Nervous system","Calves","Reflexes"]}, sets:"5×10", rest:"45s", level:"Intermedio", tips:{es:["Posición base siempre","Rodillas flexionadas","Explota al ver la señal"],en:["Base position always","Bent knees","Explode on signal"]}, icon:"🔴"},
  { id:10, cat:"agility", yt:"G-bxQY57mKc", name:{es:"Box Jump con Recepción",en:"Box Jump with Save"}, desc:{es:"Potencia vertical y coordinación. Salta, recepciona y devuelve.",en:"Vertical power and coordination. Jump, receive and return."}, muscles:{es:["Cuádriceps","Glúteos","Potencia"],en:["Quadriceps","Glutes","Power"]}, sets:"4×6", rest:"90s", level:"Avanzado", tips:{es:["Aterriza suave","Manos listas al aterrizar","No pierdas el balón"],en:["Land softly","Hands ready on landing","Don't lose the ball"]}, icon:"📦"},
  { id:11, cat:"agility", yt:"b-bqzFmDWcc", name:{es:"Salidas en T",en:"T-Drill Sprint"}, desc:{es:"Agilidad multidireccional. Sprint, lateral y retroceso.",en:"Multi-directional agility. Sprint, shuffle and backpedal."}, muscles:{es:["Gemelos","Cuádriceps","Agilidad"],en:["Calves","Quadriceps","Agility"]}, sets:"6 reps", rest:"60s", level:"Avanzado", tips:{es:["No cruces los pies","Toca cada cono","Máxima aceleración"],en:["Don't cross feet","Touch each cone","Max acceleration"]}, icon:"🏃"},
];

const routines = [
  { id:1, name:{es:"Base Portero",en:"GK Foundation"}, level:"Básico", days:3, exIds:[1,4,7,8], desc:{es:"Rutina de inicio. Fuerza fundamental y primeros drills de agilidad.",en:"Starting routine. Fundamental strength and first agility drills."} },
  { id:2, name:{es:"Alto Rendimiento",en:"High Performance"}, level:"Intermedio", days:4, exIds:[1,2,5,7,8,9], desc:{es:"Fuerza específica con agilidad y reflejos para el portero competitivo.",en:"Specific strength with agility and reflexes for competitive goalkeepers."} },
  { id:3, name:{es:"Élite GK",en:"Elite GK"}, level:"Avanzado", days:5, exIds:[3,4,6,9,10,11], desc:{es:"Máxima exigencia en potencia, reflejos y resistencia.",en:"Maximum demands on power, reflexes and endurance."} },
];

const lvlC={Básico:"#fff",Intermedio:"#aaa",Avanzado:"#ff3b3b"};
const lvlB={Básico:"#33333399",Intermedio:"#55555599",Avanzado:"#ff3b3b55"};
const T={
  es:{training:"Entrenamiento",agility:"Agilidad",progress:"Progreso",feedback:"Feedback",
      strength:"Fuerza 🏋️",agil:"Agilidad 🧤",back:"← Volver",muscles:"Músculos",
      sets:"Series × Reps",rest:"Descanso",tips:"Claves del entrenador",
      watchVideo:"▶ Ver vídeo en YouTube",level:{Básico:"Básico",Intermedio:"Intermedio",Avanzado:"Avanzado"},
      logBtn:"+ Registrar sesión",save:"Guardar",noSessions:"Sin sesiones aún",
      noSessionsSub:"Empieza a entrenar y registra tu progreso",
      selectEx:"Selecciona ejercicio...",weight:"Peso (kg)",series:"Series",reps:"Reps",
      days:"días/sem",exs:"ejercicios",included:"Ejercicios incluidos",
      fbTitle:"Feedback del Entrenador",fbNew:"+ Nuevo feedback",fbAthlete:"Nombre del portero",
      fbMsg:"Mensaje / observaciones",fbSend:"Enviar feedback",fbEmpty:"Sin feedback enviado",
      fbEmptySub:"Envía observaciones a tus porteros"},
  en:{training:"Training",agility:"Agility",progress:"Progress",feedback:"Feedback",
      strength:"Strength 🏋️",agil:"Agility 🧤",back:"← Back",muscles:"Muscles",
      sets:"Sets × Reps",rest:"Rest",tips:"Coach's Keys",
      watchVideo:"▶ Watch on YouTube",level:{Básico:"Basic",Intermedio:"Intermediate",Avanzado:"Advanced"},
      logBtn:"+ Log Session",save:"Save",noSessions:"No sessions yet",
      noSessionsSub:"Start training and log your progress",
      selectEx:"Select exercise...",weight:"Weight (kg)",series:"Sets",reps:"Reps",
      days:"days/week",exs:"exercises",included:"Included exercises",
      fbTitle:"Coach Feedback",fbNew:"+ New Feedback",fbAthlete:"Athlete name",
      fbMsg:"Message / observations",fbSend:"Send feedback",fbEmpty:"No feedback sent",
      fbEmptySub:"Send observations to your athletes"},
};

const S={
  card:{background:"#0e0e0e",border:"1px solid #1a1a1a",borderRadius:12,transition:"all 0.2s"},
  tag:(l)=>({background:"#111",border:`1px solid ${lvlB[l]}`,color:lvlC[l],padding:"4px 14px",borderRadius:20,fontSize:11,letterSpacing:2,textTransform:"uppercase"}),
  input:{background:"#000",border:"1px solid #222",color:"#eee",padding:"10px 14px",borderRadius:8,fontSize:14,width:"100%"},
  label:{color:"#444",fontSize:10,letterSpacing:3,textTransform:"uppercase",marginBottom:6,display:"block"},
  secTitle:{color:"#444",fontSize:10,letterSpacing:4,textTransform:"uppercase",marginBottom:16},
};

function App() {
  const [lang,setLang]=useState("es");
  const [tab,setTab]=useState("training");
  const [cat,setCat]=useState("strength");
  const [selEx,setSelEx]=useState(null);
  const [selR,setSelR]=useState(null);
  const [sessions,setSessions]=useState(()=>{try{return JSON.parse(localStorage.getItem("hp_s")||"[]")}catch{return[]}});
  const [fbs,setFbs]=useState(()=>{try{return JSON.parse(localStorage.getItem("hp_f")||"[]")}catch{return[]}});
  const [logF,setLogF]=useState({exId:"",weight:"",sets:"",reps:""});
  const [showLog,setShowLog]=useState(false);
  const [fbF,setFbF]=useState({athlete:"",exercise:"",rating:"",msg:""});
  const [showFb,setShowFb]=useState(false);
  const t=T[lang];

  useEffect(()=>{localStorage.setItem("hp_s",JSON.stringify(sessions))},[sessions]);
  useEffect(()=>{localStorage.setItem("hp_f",JSON.stringify(fbs))},[fbs]);

  const saveSession=()=>{
    if(!logF.exId)return;
    const ex=exercises.find(e=>e.id===parseInt(logF.exId));
    setSessions(p=>[{...logF,exName:ex?.name[lang],date:new Date().toLocaleDateString(lang==="es"?"es-ES":"en-US"),id:Date.now()},...p]);
    setLogF({exId:"",weight:"",sets:"",reps:""});setShowLog(false);
  };
  const saveFb=()=>{
    if(!fbF.athlete||!fbF.msg)return;
    const ex=exercises.find(e=>e.id===parseInt(fbF.exercise));
    setFbs(p=>[{...fbF,exName:ex?.name[lang]||"—",date:new Date().toLocaleDateString(lang==="es"?"es-ES":"en-US"),id:Date.now()},...p]);
    setFbF({athlete:"",exercise:"",rating:"",msg:""});setShowFb(false);
  };

  const goTab=(k)=>{setTab(k);setSelEx(null);setSelR(null);};

  return (
    <div style={{minHeight:"100vh",background:"#080808",color:"#f0f0f0"}}>
      {/* HEADER */}
      <div style={{background:"#000",borderBottom:"1px solid #1a1a1a",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"0 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0 0"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <img src={LOGO} alt="HP" style={{width:42,height:42,objectFit:"contain"}}/>
              <div style={{color:"#555",fontSize:9,letterSpacing:2,textTransform:"uppercase",lineHeight:1.5}}>Goalkeeper Coach<br/>High Performance</div>
            </div>
            <div style={{display:"flex",background:"#111",borderRadius:20,border:"1px solid #222",overflow:"hidden"}}>
              {["es","en"].map(l=>(
                <button key={l} onClick={()=>setLang(l)} style={{background:lang===l?"#fff":"none",color:lang===l?"#000":"#555",border:"none",padding:"5px 14px",cursor:"pointer",fontWeight:700,fontSize:12,letterSpacing:1,transition:"all 0.2s",textTransform:"uppercase"}}>{l}</button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",marginTop:10,overflowX:"auto"}}>
            {[["training","🏋️ "+t.training],["agility","🧤 "+t.agility],["progress","📈 "+t.progress],["feedback","💬 "+t.feedback]].map(([k,lb])=>(
              <button key={k} onClick={()=>goTab(k)} style={{background:"none",border:"none",color:tab===k?"#fff":"#444",cursor:"pointer",padding:"10px 14px",fontSize:12,letterSpacing:1,borderBottom:tab===k?"2px solid #fff":"2px solid transparent",transition:"all 0.2s",textTransform:"uppercase",fontWeight:tab===k?700:400,whiteSpace:"nowrap"}}>{lb}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"24px 16px"}}>

        {/* TRAINING */}
        {tab==="training" && <div className="up">
          {selEx ? (
            <div>
              <button onClick={()=>setSelEx(null)} style={{background:"none",border:"1px solid #222",color:"#888",cursor:"pointer",padding:"7px 16px",borderRadius:6,marginBottom:20,fontSize:13}}>{t.back}</button>
              <div style={{...S.card,border:"1px solid #222",padding:26}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div style={{fontSize:42,marginBottom:8}}>{selEx.icon}</div>
                  <span style={S.tag(selEx.level)}>{t.level[selEx.level]}</span>
                </div>
                <h2 style={{fontSize:26,fontWeight:900,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>{selEx.name[lang]}</h2>
                <p style={{color:"#888",lineHeight:1.7,marginBottom:22,fontSize:14,fontFamily:"'Barlow',sans-serif"}}>{selEx.desc[lang]}</p>
                <a href={`https://www.youtube.com/watch?v=${selEx.yt}`} target="_blank" rel="noreferrer"
                  style={{display:"flex",alignItems:"center",gap:12,background:"#ff0000",color:"#fff",padding:"13px 20px",borderRadius:10,marginBottom:22,fontWeight:800,fontSize:14,letterSpacing:2,textTransform:"uppercase"}}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                  {t.watchVideo}
                </a>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:22}}>
                  {[[t.sets,selEx.sets],[t.rest,selEx.rest]].map(([lb,val])=>(
                    <div key={lb} style={{background:"#000",border:"1px solid #1a1a1a",borderRadius:10,padding:"14px 16px"}}>
                      <div style={{...S.label,marginBottom:4}}>{lb}</div>
                      <div style={{color:"#fff",fontSize:22,fontWeight:900}}>{val}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:22}}>
                  <div style={S.label}>{t.muscles}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {selEx.muscles[lang].map(m=><span key={m} style={{background:"#111",border:"1px solid #222",color:"#aaa",padding:"4px 14px",borderRadius:20,fontSize:12}}>{m}</span>)}
                  </div>
                </div>
                <div style={{borderTop:"1px solid #1a1a1a",paddingTop:18}}>
                  <div style={S.label}>{t.tips}</div>
                  {selEx.tips[lang].map((tip,i)=>(
                    <div key={i} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
                      <div style={{width:20,height:20,border:"1px solid #fff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,flexShrink:0,marginTop:1}}>{i+1}</div>
                      <span style={{color:"#bbb",fontSize:14,fontFamily:"'Barlow',sans-serif",lineHeight:1.5}}>{tip}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ) : selR ? (
            <div>
              <button onClick={()=>setSelR(null)} style={{background:"none",border:"1px solid #222",color:"#888",cursor:"pointer",padding:"7px 16px",borderRadius:6,marginBottom:20,fontSize:13}}>{t.back}</button>
              <div style={{...S.card,border:"1px solid #222",padding:22,marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <h2 style={{fontWeight:900,fontSize:22,letterSpacing:2,textTransform:"uppercase"}}>{selR.name[lang]}</h2>
                  <span style={S.tag(selR.level)}>{t.level[selR.level]}</span>
                </div>
                <p style={{color:"#777",fontFamily:"'Barlow',sans-serif",marginBottom:12,lineHeight:1.6,fontSize:14}}>{selR.desc[lang]}</p>
                <div style={{color:"#555",fontSize:13}}>📅 {selR.days} {t.days} · 🧤 {selR.exIds.length} {t.exs}</div>
              </div>
              <div style={S.secTitle}>{t.included}</div>
              <div style={{display:"grid",gap:10}}>
                {selR.exIds.map(id=>{const ex=exercises.find(e=>e.id===id);if(!ex)return null;return(
                  <div key={id} onClick={()=>setSelEx(ex)} className="hov" style={{...S.card,padding:"14px 18px",cursor:"pointer",display:"flex",gap:14,alignItems:"center"}}>
                    <div style={{fontSize:26}}>{ex.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:16,letterSpacing:1,textTransform:"uppercase",color:"#eee"}}>{ex.name[lang]}</div>
                      <div style={{color:"#444",fontSize:12,marginTop:2}}>{ex.sets} · {ex.rest}</div>
                    </div>
                    <div style={{color:"#333",fontSize:20}}>›</div>
                  </div>
                );})}
              </div>
            </div>
          ) : (
            <div>
              <div style={{display:"flex",gap:8,marginBottom:22}}>
                {[["strength",t.strength],["agility",t.agil]].map(([k,lb])=>(
                  <button key={k} onClick={()=>setCat(k)} style={{background:cat===k?"#fff":"#111",color:cat===k?"#000":"#555",border:`1px solid ${cat===k?"#fff":"#222"}`,padding:"8px 18px",borderRadius:24,cursor:"pointer",fontWeight:700,fontSize:13,letterSpacing:2,textTransform:"uppercase",transition:"all 0.2s"}}>{lb}</button>
                ))}
              </div>
              <div style={{display:"grid",gap:10,marginBottom:30}}>
                {exercises.filter(e=>e.cat===cat).map(ex=>(
                  <div key={ex.id} onClick={()=>setSelEx(ex)} className="hov" style={{...S.card,padding:"16px 18px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",gap:14,alignItems:"center"}}>
                      <div style={{fontSize:28}}>{ex.icon}</div>
                      <div>
                        <div style={{fontWeight:700,fontSize:17,letterSpacing:1,textTransform:"uppercase",color:"#eee",marginBottom:2}}>{ex.name[lang]}</div>
                        <div style={{color:"#444",fontSize:12}}>{ex.muscles[lang].slice(0,2).join(" · ")}</div>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <span style={{color:lvlC[ex.level],fontSize:10,letterSpacing:2,textTransform:"uppercase"}}>{t.level[ex.level]}</span>
                      <div style={{color:"#333",fontSize:20,marginTop:3}}>›</div>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{borderTop:"1px solid #1a1a1a",paddingTop:26}}>
                <div style={S.secTitle}>— Routines / Rutinas</div>
                <div style={{display:"grid",gap:10}}>
                  {routines.map(r=>(
                    <div key={r.id} onClick={()=>setSelR(r)} className="rhov" style={{...S.card,padding:"16px 18px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:17,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>{r.name[lang]}</div>
                        <div style={{color:"#444",fontSize:12}}>{r.days} {t.days} · {r.exIds.length} {t.exs}</div>
                      </div>
                      <span style={S.tag(r.level)}>{t.level[r.level]}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>}

        {/* AGILITY */}
        {tab==="agility" && <div className="up">
          <div style={{marginBottom:22}}>
            <div style={{fontWeight:900,fontSize:26,letterSpacing:3,textTransform:"uppercase",marginBottom:4}}>{lang==="es"?"Drills de Agilidad":"Agility Drills"}</div>
            <div style={{color:"#555",fontSize:13,fontFamily:"'Barlow',sans-serif"}}>{lang==="es"?"Ejercicios específicos para porteros":"Goalkeeper-specific drills"}</div>
          </div>
          <div style={{display:"grid",gap:10}}>
            {exercises.filter(e=>e.cat==="agility").map(ex=>(
              <div key={ex.id} onClick={()=>{setTab("training");setSelEx(ex);}} className="hov" style={{...S.card,padding:18,cursor:"pointer"}}>
                <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                  <div style={{fontSize:32}}>{ex.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:17,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>{ex.name[lang]}</div>
                    <div style={{color:"#666",fontSize:13,fontFamily:"'Barlow',sans-serif",lineHeight:1.5,marginBottom:8}}>{ex.desc[lang].slice(0,75)}…</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      <span style={{background:"#111",border:"1px solid #222",color:"#555",padding:"3px 10px",borderRadius:16,fontSize:11}}>{ex.sets}</span>
                      <span style={{background:"#111",border:"1px solid #222",color:"#555",padding:"3px 10px",borderRadius:16,fontSize:11}}>{ex.rest}</span>
                      <span style={{color:lvlC[ex.level],fontSize:10,letterSpacing:2,padding:"3px 10px",border:`1px solid ${lvlB[ex.level]}`,borderRadius:16}}>{t.level[ex.level]}</span>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>}

        {/* PROGRESS */}
        {tab==="progress" && <div className="up">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div>
              <div style={{fontWeight:900,fontSize:24,letterSpacing:3,textTransform:"uppercase"}}>{t.progress}</div>
              <div style={{color:"#444",fontSize:12}}>{sessions.length} {lang==="es"?"sesiones":"sessions"}</div>
            </div>
            <button onClick={()=>setShowLog(s=>!s)} style={{background:"#fff",color:"#000",border:"none",padding:"9px 18px",borderRadius:24,cursor:"pointer",fontWeight:800,fontSize:13,letterSpacing:2,textTransform:"uppercase"}}>{t.logBtn}</button>
          </div>
          {showLog && <div style={{...S.card,border:"1px solid #333",padding:20,marginBottom:20}}>
            <div style={{fontWeight:800,fontSize:15,letterSpacing:2,textTransform:"uppercase",marginBottom:14,color:"#aaa"}}>{lang==="es"?"Nueva sesión":"New Session"}</div>
            <div style={{display:"grid",gap:12}}>
              <select value={logF.exId} onChange={e=>setLogF(p=>({...p,exId:e.target.value}))} style={S.input}>
                <option value="">{t.selectEx}</option>
                {exercises.map(ex=><option key={ex.id} value={ex.id}>{ex.name[lang]}</option>)}
              </select>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                {[["weight",t.weight],["sets",t.series],["reps",t.reps]].map(([f,lb])=>(
                  <div key={f}><label style={S.label}>{lb}</label>
                    <input type="number" value={logF[f]} onChange={e=>setLogF(p=>({...p,[f]:e.target.value}))} style={S.input}/>
                  </div>
                ))}
              </div>
              <button onClick={saveSession} style={{background:"#fff",color:"#000",border:"none",padding:11,borderRadius:8,cursor:"pointer",fontWeight:800,letterSpacing:2,fontSize:14,textTransform:"uppercase"}}>{t.save}</button>
            </div>
          </div>}
          {sessions.length===0 ? (
            <div style={{textAlign:"center",padding:"60px 20px",color:"#2a2a2a"}}>
              <img src={LOGO} alt="" style={{width:56,height:56,objectFit:"contain",opacity:0.12,marginBottom:14}}/>
              <div style={{fontWeight:900,fontSize:17,letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>{t.noSessions}</div>
              <div style={{fontSize:13,fontFamily:"'Barlow',sans-serif"}}>{t.noSessionsSub}</div>
            </div>
          ) : (
            <div style={{display:"grid",gap:10}}>
              {sessions.map(s=>(
                <div key={s.id} style={{...S.card,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:15,letterSpacing:1,textTransform:"uppercase",color:"#ddd",marginBottom:3}}>{s.exName}</div>
                    <div style={{color:"#444",fontSize:12}}>{s.date}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    {s.weight && <div style={{color:"#fff",fontWeight:900,fontSize:20}}>{s.weight}<span style={{fontSize:11,color:"#555"}}> kg</span></div>}
                    {s.sets && s.reps && <div style={{color:"#555",fontSize:12}}>{s.sets}×{s.reps}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>}

        {/* FEEDBACK */}
        {tab==="feedback" && <div className="up">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div>
              <div style={{fontWeight:900,fontSize:24,letterSpacing:3,textTransform:"uppercase"}}>{t.fbTitle}</div>
              <div style={{color:"#444",fontSize:12}}>{lang==="es"?"Observaciones para tus porteros":"Observations for your athletes"}</div>
            </div>
            <button onClick={()=>setShowFb(s=>!s)} style={{background:"#fff",color:"#000",border:"none",padding:"9px 18px",borderRadius:24,cursor:"pointer",fontWeight:800,fontSize:13,letterSpacing:2,textTransform:"uppercase"}}>{t.fbNew}</button>
          </div>
          {showFb && <div style={{...S.card,border:"1px solid #333",padding:22,marginBottom:24}}>
            <div style={{fontWeight:800,fontSize:15,letterSpacing:2,textTransform:"uppercase",marginBottom:16,color:"#aaa"}}>💬 {lang==="es"?"Nuevo Feedback":"New Feedback"}</div>
            <div style={{display:"grid",gap:14}}>
              <div><label style={S.label}>{t.fbAthlete}</label>
                <input value={fbF.athlete} onChange={e=>setFbF(p=>({...p,athlete:e.target.value}))} placeholder={lang==="es"?"Ej: Carlos García":"E.g. John Smith"} style={S.input}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><label style={S.label}>{lang==="es"?"Ejercicio":"Exercise"}</label>
                  <select value={fbF.exercise} onChange={e=>setFbF(p=>({...p,exercise:e.target.value}))} style={S.input}>
                    <option value="">{lang==="es"?"Opcional":"Optional"}</option>
                    {exercises.map(ex=><option key={ex.id} value={ex.id}>{ex.name[lang]}</option>)}
                  </select>
                </div>
                <div><label style={S.label}>{lang==="es"?"Valoración":"Rating"}</label>
                  <select value={fbF.rating} onChange={e=>setFbF(p=>({...p,rating:e.target.value}))} style={S.input}>
                    <option value="">{lang==="es"?"Opcional":"Optional"}</option>
                    {["1","2","3","4","5"].map(n=><option key={n} value={n}>{"⭐".repeat(parseInt(n))} {n}/5</option>)}
                  </select>
                </div>
              </div>
              <div><label style={S.label}>{t.fbMsg}</label>
                <textarea value={fbF.msg} onChange={e=>setFbF(p=>({...p,msg:e.target.value}))} rows={4} placeholder={lang==="es"?"Escribe tus observaciones...":"Write your observations..."} style={{...S.input,padding:"12px 14px"}}/>
              </div>
              <button onClick={saveFb} style={{background:"#fff",color:"#000",border:"none",padding:12,borderRadius:8,cursor:"pointer",fontWeight:800,letterSpacing:2,fontSize:14,textTransform:"uppercase"}}>{t.fbSend} ✓</button>
            </div>
          </div>}
          {fbs.length===0 ? (
            <div style={{textAlign:"center",padding:"60px 20px",color:"#2a2a2a"}}>
              <div style={{fontSize:52,marginBottom:14}}>💬</div>
              <div style={{fontWeight:900,fontSize:17,letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>{t.fbEmpty}</div>
              <div style={{fontSize:13,fontFamily:"'Barlow',sans-serif"}}>{t.fbEmptySub}</div>
            </div>
          ) : (
            <div style={{display:"grid",gap:12}}>
              {fbs.map(fb=>(
                <div key={fb.id} style={{...S.card,border:"1px solid #1a1a1a",padding:"18px 20px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:16,letterSpacing:1,textTransform:"uppercase",color:"#eee",marginBottom:2}}>👤 {fb.athlete}</div>
                      {fb.exName && fb.exName!=="—" && <div style={{color:"#555",fontSize:12}}>🏋️ {fb.exName}</div>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      {fb.rating && <div style={{fontSize:13,marginBottom:2}}>{"⭐".repeat(parseInt(fb.rating))}</div>}
                      <div style={{color:"#444",fontSize:11}}>{fb.date}</div>
                    </div>
                  </div>
                  <div style={{background:"#000",border:"1px solid #1a1a1a",borderRadius:8,padding:"12px 14px",color:"#bbb",fontSize:14,fontFamily:"'Barlow',sans-serif",lineHeight:1.6}}>"{fb.msg}"</div>
                </div>
              ))}
            </div>
          )}
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
